<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LegendsOfManzan</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a1a1a 0%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', 'Lucida Sans Typewriter', monospace;
            margin: 0;
            padding: 10px;
        }

        .game-container {
            background: #2c2c28;
            border-radius: clamp(16px, 5vw, 32px);
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
            padding: clamp(12px, 3vw, 25px);
            width: 100%;
            max-width: 1000px;
        }

        .canvas-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 900 / 250;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: clamp(12px, 4vw, 18px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: clamp(0.9rem, 4vw, 1.3rem);
            background: #1a1a1a;
            color: #ffd966;
            padding: 8px clamp(12px, 4vw, 20px);
            border-radius: 60px;
        }

        .score-box, .high-box {
            background: #000000;
            padding: 5px clamp(12px, 3vw, 16px);
            border-radius: 40px;
            white-space: nowrap;
        }

        .restart-btn {
            background: #d96c1e;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: clamp(0.8rem, 3.5vw, 1.1rem);
            padding: 6px clamp(12px, 3vw, 20px);
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        .restart-btn:active {
            transform: scale(0.95);
        }

        .status {
            background: #3a2a1a;
            margin-top: 12px;
            text-align: center;
            padding: 8px;
            border-radius: 40px;
            font-weight: bold;
            color: #ffaa66;
            font-size: clamp(0.7rem, 3vw, 0.9rem);
        }

        .controls-hint {
            font-size: clamp(0.6rem, 2.5vw, 0.75rem);
            margin-top: 10px;
            text-align: center;
            color: #ccaaff;
            background: #2a1a0a;
            padding: 5px;
            border-radius: 60px;
        }

        .jump-test-btn {
            background: #ff6600;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            padding: 10px clamp(15px, 5vw, 25px);
            border-radius: 50px;
            color: white;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }
        .jump-test-btn:active {
            transform: scale(0.97);
        }

        .loading {
            text-align: center;
            color: yellow;
            font-size: clamp(10px, 3vw, 12px);
            margin-top: 10px;
        }

        .sound-control {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .sound-btn {
            background: #444;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-family: monospace;
            font-size: 12px;
        }
        .sound-btn.active {
            background: #00aa00;
        }

        .start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            border-radius: clamp(12px, 4vw, 18px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            cursor: pointer;
        }
        .start-overlay span {
            font-size: 2rem;
            font-weight: bold;
            color: #ffaa66;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .start-overlay small {
            font-size: 0.8rem;
            color: #ccc;
            margin-top: 10px;
        }
        .canvas-wrapper {
            position: relative;
        }

        .record-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a1a1a;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 100;
            animation: slideUp 0.5s ease, fadeOut 0.5s ease 2s forwards;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            white-space: nowrap;
            font-family: monospace;
        }
        .record-toast span {
            font-size: 1.5rem;
            margin-right: 8px;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        @media (max-width: 550px) {
            body {
                padding: 5px;
            }
            .info-panel {
                flex-wrap: wrap;
                justify-content: center;
            }
            .score-box, .high-box {
                white-space: normal;
                text-align: center;
            }
            .start-overlay span {
                font-size: 1.2rem;
            }
            .record-toast {
                font-size: 0.9rem;
                padding: 8px 16px;
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <div class="canvas-wrapper" id="canvasWrapper">
            <canvas id="gameCanvas" width="900" height="250"></canvas>
            <div class="start-overlay" id="startOverlay">
                <span>🎮 НАЖМИТЕ, ЧТОБЫ НАЧАТЬ 🎮</span>
                <small>Legends Of Manzan</small>
            </div>
        </div>
        <div class="info-panel">
            <div class="score-box"><span>🍖 SCORE</span> <span id="scoreValue">0</span></div>
            <div class="high-box"><span>🏆 BEST</span> <span id="highScoreValue">0</span></div>
            <button class="restart-btn" id="restartButton">▶ НОВАЯ ИГРА</button>
        </div>
        <div class="status" id="gameStatusText">🥖 БЕГИ! НЕ ЕШЬ ЭТО!</div>
        <div class="controls-hint">
            🥐 ПРОБЕЛ / СТРЕЛКА ВВЕРХ / КЛИК / КНОПКА — ПРЫЖОК
        </div>
        <button class="jump-test-btn" id="jumpButton">⚽ ПРЫЖОК ⚽</button>
        <div class="sound-control">
            <button id="musicToggleBtn" class="sound-btn active">🎵 МУЗЫКА ВКЛ</button>
        </div>
        <div class="loading" id="loadingStatus">📦 ЗАГРУЗКА СПРАЙТОВ...</div>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const loadingDiv = document.getElementById('loadingStatus');
        const startOverlay = document.getElementById('startOverlay');
        
        let gameStarted = false;
        
        const RUN_FRAMES = [
            "manz/1.png",
            "manz/2.png",
            "manz/3.png",
            "manz/4.png"
        ];
        
        const JUMP_SPRITE = "manz/jump.png";
        const RIB_SPRITE = "pngtree-roasted-pork-ribs-png-image_13146536.png";
        
        const PARIS_BG_IMAGE = "fonwall.ru-eiffel-tower-paris-france-eyfeleva-bashnya-vvps.jpg";
        
        let parisBackground = new Image();
        let backgroundLoaded = false;
        
        parisBackground.onload = () => {
            backgroundLoaded = true;
        };
        parisBackground.onerror = () => {
            backgroundLoaded = false;
        };
        parisBackground.src = PARIS_BG_IMAGE;
        
        const ORIGINAL_WIDTH = 900;
        const ORIGINAL_HEIGHT = 250;
        const GROUND_Y = 210;
        
        const PLAYER_DRAW_WIDTH = 80;
        const PLAYER_DRAW_HEIGHT = 96;
        
        const PLAYER_HITBOX_WIDTH = 35;
        const PLAYER_HITBOX_HEIGHT = 85;
        const PLAYER_HITBOX_OFFSET_X = 10;
        const PLAYER_HITBOX_OFFSET_Y = 0;
        
        const RIB_HITBOX_WIDTH = 40;
        const RIB_HITBOX_HEIGHT = 40;
        const RIB_HITBOX_OFFSET_X = 12;
        const RIB_HITBOX_OFFSET_Y = -2;
        
        let runImages = [];
        let jumpImage = null;
        let ribImage = null;
        let loadedCount = 0;
        let totalToLoad = RUN_FRAMES.length + 2;
        
        function imageLoaded() {
            loadedCount++;
            loadingDiv.innerHTML = `📦 ЗАГРУЖЕНО: ${loadedCount}/${totalToLoad}`;
            if (loadedCount === totalToLoad) {
                loadingDiv.innerHTML = "✅";
                setTimeout(() => { loadingDiv.style.opacity = "0"; }, 2000);
            }
        }
        
        for (let i = 0; i < RUN_FRAMES.length; i++) {
            let img = new Image();
            img.onload = imageLoaded;
            img.onerror = () => { imageLoaded(); };
            img.src = RUN_FRAMES[i];
            runImages.push(img);
        }
        
        jumpImage = new Image();
        jumpImage.onload = imageLoaded;
        jumpImage.onerror = () => { imageLoaded(); };
        jumpImage.src = JUMP_SPRITE;
        
        ribImage = new Image();
        ribImage.onload = imageLoaded;
        ribImage.onerror = () => { imageLoaded(); };
        ribImage.src = RIB_SPRITE;
        
        let gameRunning = true;
        let score = 0;
        let highScore = localStorage.getItem('ribHighScore') ? parseInt(localStorage.getItem('ribHighScore')) : 0;
        let frame = 0;
        let speed = 5;
        
        let isJumping = false;
        let yPos = 0;
        let yVelocity = 0;
        const GRAVITY = 0.65;
        const JUMP_POWER = -12;
        
        let currentRunFrame = 0;
        let frameCounter = 0;
        let pendingJump = false;
        let obstacles = [];
        
        let cloudPositions = [
            { x: 120, y: 45, size: 35 },
            { x: 350, y: 65, size: 28 },
            { x: 600, y: 35, size: 40 },
            { x: 800, y: 55, size: 30 }
        ];
        
        let eiffelX = 750;
        
        let soundEnabled = true;
        let musicEnabled = true;
        
        let recordSound = null;
        let lastHighScore = highScore;
        let pendingRecordScore = null;
        
        function createAudio(url, loop = false, volume = 0.5) {
            const audio = new Audio();
            audio.src = url;
            audio.loop = loop;
            audio.volume = volume;
            audio.load();
            return audio;
        }
        
        function showRecordNotification(newScore) {
            const toast = document.createElement('div');
            toast.className = 'record-toast';
            toast.innerHTML = `<span>🏆 НОВЫЙ РЕКОРД! 🏆</span><br>${newScore} очков!`;
            document.body.appendChild(toast);
            
            if (recordSound && soundEnabled) {
                recordSound.currentTime = 0;
                recordSound.play().catch(e => console.log("Record sound error:", e));
            }
            
            setTimeout(() => {
                if (toast && toast.remove) toast.remove();
            }, 2500);
        }
        
        let bgMusic = null;
        
        let jumpSounds = [];
        let deathSounds = [];
        let runningSounds = [];
        
        let lastRunningSoundFrame = 0;
        let runningSoundCooldown = 120;
        
        function initSounds() {
            bgMusic = createAudio("french meme song.mp3", true, 0.3);
            recordSound = createAudio("manz/record.mp3", false, 0.7);
            
            jumpSounds = [
                createAudio("manz/jump1.mp3", false, 0.5),
                createAudio("manz/jump2.mp3", false, 0.5)
            ];
            
            deathSounds = [
                createAudio("manz/death1.mp3", false, 0.6),
                createAudio("manz/death3.mp3", false, 0.6),
                createAudio("manz/death1.mp3", false, 0.6)
            ];
            
            runningSounds = [];
        }
        
        function getRandomSound(soundArray) {
            if (!soundArray.length) return null;
            const validSounds = soundArray.filter(s => s);
            if (!validSounds.length) return null;
            const randomIndex = Math.floor(Math.random() * validSounds.length);
            return validSounds[randomIndex];
        }
        
        function playRandomJumpSound() {
            if (!soundEnabled || !gameStarted) return;
            const sound = getRandomSound(jumpSounds);
            if (sound) {
                sound.currentTime = 0;
                sound.play().catch(e => console.log("Jump sound error:", e));
            }
        }
        
        function playRandomDeathSound() {
            if (!soundEnabled) return;
            const sound = getRandomSound(deathSounds);
            if (sound) {
                sound.currentTime = 0;
                sound.play().catch(e => console.log("Death sound error:", e));
            }
        }
        
        function playRandomRunningSound() {
            if (!soundEnabled || !gameStarted || !gameRunning) return;
            const sound = getRandomSound(runningSounds);
            if (sound) {
                sound.currentTime = 0;
                sound.play().catch(e => console.log("Running sound error:", e));
            }
        }
        
        function startMusic() {
            if (bgMusic && musicEnabled && soundEnabled && gameStarted && gameRunning) {
                bgMusic.play().catch(e => console.log("Music play error:", e));
            }
        }
        
        function stopMusic() {
            if (bgMusic) {
                bgMusic.pause();
                bgMusic.currentTime = 0;
            }
        }
        
        function toggleMusic() {
            musicEnabled = !musicEnabled;
            const btn = document.getElementById('musicToggleBtn');
            if (musicEnabled) {
                btn.textContent = "🎵 МУЗЫКА ВКЛ";
                btn.classList.add('active');
                if (soundEnabled && gameStarted && gameRunning) {
                    bgMusic.play().catch(e => console.log("Music resume error:", e));
                }
            } else {
                btn.textContent = "🔇 МУЗЫКА ВЫКЛ";
                btn.classList.remove('active');
                if (bgMusic) {
                    bgMusic.pause();
                }
            }
        }
        
        document.getElementById('musicToggleBtn').addEventListener('click', toggleMusic);
        
        function drawFootballField() {
            ctx.fillStyle = "#1a5c1a";
            ctx.fillRect(0, GROUND_Y - 15, ORIGINAL_WIDTH, 20);
            
            ctx.fillStyle = "#2a7a2a";
            for(let i = 0; i < 12; i++) {
                let offset = 30 + i*75 - (frame * 0.5) % 75;
                ctx.fillRect(offset, GROUND_Y - 12, 4, 8);
            }
            
            ctx.strokeStyle = "#FFFFFF";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, GROUND_Y - 5);
            ctx.lineTo(ORIGINAL_WIDTH, GROUND_Y - 5);
            ctx.stroke();
        }
        
        function drawParisBackground() {
            if (backgroundLoaded && parisBackground.complete && parisBackground.naturalWidth > 0) {
                ctx.drawImage(parisBackground, 0, 0, ORIGINAL_WIDTH, GROUND_Y - 10);
            } else {
                const grad = ctx.createLinearGradient(0, 0, 0, 150);
                grad.addColorStop(0, "#FFB347");
                grad.addColorStop(0.5, "#FF8C42");
                grad.addColorStop(1, "#E8734A");
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, ORIGINAL_WIDTH, GROUND_Y - 10);
                
                ctx.fillStyle = "rgba(255, 240, 210, 0.85)";
                for (let cloud of cloudPositions) {
                    ctx.beginPath();
                    ctx.ellipse(cloud.x, cloud.y, cloud.size, cloud.size * 0.6, 0, 0, Math.PI*2);
                    ctx.ellipse(cloud.x + cloud.size*0.7, cloud.y - 5, cloud.size*0.7, cloud.size*0.5, 0, 0, Math.PI*2);
                    ctx.fill();
                }
                
                ctx.fillStyle = "#4A3728";
                ctx.beginPath();
                ctx.moveTo(eiffelX, GROUND_Y - 15);
                ctx.lineTo(eiffelX + 14, GROUND_Y - 70);
                ctx.lineTo(eiffelX - 14, GROUND_Y - 70);
                ctx.fill();
                ctx.fillStyle = "#5C3D2E";
                ctx.fillRect(eiffelX - 7, GROUND_Y - 100, 14, 85);
                ctx.fillStyle = "#6B4A38";
                ctx.fillRect(eiffelX - 16, GROUND_Y - 100, 32, 4);
                ctx.fillRect(eiffelX - 12, GROUND_Y - 125, 24, 3);
                ctx.fillRect(eiffelX - 8, GROUND_Y - 145, 16, 3);
                ctx.beginPath();
                ctx.moveTo(eiffelX, GROUND_Y - 165);
                ctx.lineTo(eiffelX - 3, GROUND_Y - 148);
                ctx.lineTo(eiffelX + 3, GROUND_Y - 148);
                ctx.fill();
                
                ctx.fillStyle = "#0055A4";
                ctx.fillRect(eiffelX + 12, GROUND_Y - 105, 4, 12);
                ctx.fillStyle = "#FFFFFF";
                ctx.fillRect(eiffelX + 16, GROUND_Y - 105, 4, 12);
                ctx.fillStyle = "#EF4135";
                ctx.fillRect(eiffelX + 20, GROUND_Y - 105, 4, 12);
            }
        }
        
        function updateHighScoreUI() {
            document.getElementById('highScoreValue').innerText = highScore;
        }
        updateHighScoreUI();
        
        function checkAndShowRecord() {
            if (pendingRecordScore !== null && pendingRecordScore > 0) {
                showRecordNotification(pendingRecordScore);
                pendingRecordScore = null;
            }
        }
        
        function setHighScoreIfNeeded() {
            if(score > highScore) {
                const isNewRecord = (score > lastHighScore);
                highScore = score;
                localStorage.setItem('ribHighScore', highScore);
                updateHighScoreUI();
                lastHighScore = highScore;
                
                if (isNewRecord && gameStarted) {
                    pendingRecordScore = score;
                }
                return true;
            }
            return false;
        }
        
        function getPlayerHitbox() {
            const playerX = 70 + PLAYER_HITBOX_OFFSET_X;
            const playerY = GROUND_Y + yPos - PLAYER_HITBOX_HEIGHT + PLAYER_HITBOX_OFFSET_Y;
            return {
                x: playerX,
                y: playerY,
                w: PLAYER_HITBOX_WIDTH,
                h: PLAYER_HITBOX_HEIGHT
            };
        }
        
        function drawPlayer() {
            const x = 70;
            const y = GROUND_Y + yPos - PLAYER_DRAW_HEIGHT + 8;
            
            let imgToDraw = null;
            
            if (isJumping) {
                imgToDraw = jumpImage;
            } else {
                if (runImages.length > 0 && runImages[currentRunFrame] && runImages[currentRunFrame].complete) {
                    imgToDraw = runImages[currentRunFrame];
                } else if (runImages.length > 0) {
                    imgToDraw = runImages[0];
                }
            }
            
            if (imgToDraw && imgToDraw.complete && imgToDraw.naturalWidth > 0) {
                ctx.drawImage(imgToDraw, x, y, PLAYER_DRAW_WIDTH, PLAYER_DRAW_HEIGHT);
            } else {
                ctx.fillStyle = "#ffcc88";
                ctx.fillRect(x, y, PLAYER_DRAW_WIDTH, PLAYER_DRAW_HEIGHT);
            }
            
            ctx.fillStyle = "rgba(0,0,0,0.25)";
            ctx.beginPath();
            ctx.ellipse(x+25, GROUND_Y + yPos + 6, 22, 6, 0, 0, Math.PI*2);
            ctx.fill();
        }
        
        class Ribs {
            constructor(xPos) {
                this.x = xPos;
                this.drawWidth = 64;
                this.drawHeight = 64;
                this.hitboxWidth = RIB_HITBOX_WIDTH;
                this.hitboxHeight = RIB_HITBOX_HEIGHT;
                this.hitboxOffsetX = RIB_HITBOX_OFFSET_X;
                this.hitboxOffsetY = RIB_HITBOX_OFFSET_Y;
                this.passed = false;
            }
            draw() {
                if (ribImage.complete && ribImage.naturalWidth > 0) {
                    ctx.drawImage(ribImage, this.x, GROUND_Y - this.drawHeight, this.drawWidth, this.drawHeight);
                } else {
                    ctx.fillStyle = "#ffaa66";
                    ctx.fillRect(this.x, GROUND_Y - this.drawHeight, this.drawWidth, this.drawHeight);
                }
            }
            update() {
                this.x -= speed;
            }
            getHitboxRect() {
                return {
                    x: this.x + this.hitboxOffsetX,
                    y: GROUND_Y - this.hitboxHeight + this.hitboxOffsetY,
                    w: this.hitboxWidth,
                    h: this.hitboxHeight
                };
            }
        }
        
        function spawnObstacle() {
            let dynamicGap = Math.max(70, 140 - Math.floor(speed * 3));
            if (obstacles.length === 0) {
                obstacles.push(new Ribs(ORIGINAL_WIDTH));
            } else {
                let last = obstacles[obstacles.length-1];
                if (last.x < ORIGINAL_WIDTH - dynamicGap) {
                    obstacles.push(new Ribs(ORIGINAL_WIDTH));
                }
            }
        }
        
        function checkCollision() {
            const playerBox = getPlayerHitbox();
            for(let obs of obstacles) {
                const obsBox = obs.getHitboxRect();
                if (playerBox.x < obsBox.x + obsBox.w &&
                    playerBox.x + playerBox.w > obsBox.x &&
                    playerBox.y < obsBox.y + obsBox.h &&
                    playerBox.y + playerBox.h > obsBox.y) {
                    return true;
                }
            }
            return false;
        }
        
        function updateGame() {
            if(!gameStarted || !gameRunning) return;
            
            if(pendingJump && !isJumping && yPos === 0) {
                isJumping = true;
                yVelocity = JUMP_POWER;
                playRandomJumpSound();
            }
            pendingJump = false;
            
            if(isJumping) {
                yPos += yVelocity;
                yVelocity += GRAVITY;
                if(yPos >= 0) {
                    yPos = 0;
                    isJumping = false;
                    yVelocity = 0;
                }
            }
            
            if(!isJumping && gameRunning && runImages.length > 0) {
                frameCounter++;
                if(frameCounter > 5) {
                    frameCounter = 0;
                    currentRunFrame = (currentRunFrame + 1) % runImages.length;
                    
                    if (frame - lastRunningSoundFrame > runningSoundCooldown) {
                        let chance = Math.random();
                        if (chance < 0.25) {
                            playRandomRunningSound();
                            lastRunningSoundFrame = frame;
                            runningSoundCooldown = 100 + Math.random() * 80;
                        }
                    }
                }
            }
            
            for(let i=0; i<obstacles.length; i++) {
                const obs = obstacles[i];
                obs.update();
                if(obs.x + obs.drawWidth < 0) {
                    obstacles.splice(i,1);
                    i--;
                    score += 15;
                    document.getElementById('scoreValue').innerText = Math.floor(score);
                    setHighScoreIfNeeded();
                    continue;
                }
                if(!obs.passed && obs.x + obs.drawWidth/2 < 70) {
                    obs.passed = true;
                    score += 10;
                    document.getElementById('scoreValue').innerText = Math.floor(score);
                    setHighScoreIfNeeded();
                }
            }
            
            let targetSpeed = 5 + Math.floor(score / 300);
            if(targetSpeed > 14) targetSpeed = 14;
            if(speed < targetSpeed) speed += 0.02;
            
            let spawnRate = Math.max(55, 110 - Math.floor(speed * 2.5));
            if(frame % Math.floor(spawnRate) === 0 && obstacles.length < 3) {
                if(Math.random() < 0.55) spawnObstacle();
            }
            
            if(checkCollision()) {
                gameRunning = false;
                playRandomDeathSound();
                stopMusic();
                document.getElementById('gameStatusText').innerHTML = "💀 GAME OVER 💀";
                
                if (pendingRecordScore !== null) {
                    setTimeout(() => {
                        checkAndShowRecord();
                    }, 1000);
                }
                return;
            }
            
            if(frame % 60 === 0) {
                score += 2;
                document.getElementById('scoreValue').innerText = Math.floor(score);
                setHighScoreIfNeeded();
            }
            
            frame++;
            
            for (let cloud of cloudPositions) {
                cloud.x += 0.3;
                if (cloud.x > ORIGINAL_WIDTH + 50) cloud.x = -80;
            }
            eiffelX = 750 + Math.sin(frame * 0.02) * 1;
        }
        
        function draw() {
            ctx.clearRect(0, 0, ORIGINAL_WIDTH, ORIGINAL_HEIGHT);
            
            drawParisBackground();
            drawFootballField();
            
            for(let obs of obstacles) obs.draw();
            drawPlayer();
            
            if(!gameRunning && gameStarted) {
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0, 0, ORIGINAL_WIDTH, ORIGINAL_HEIGHT);
                ctx.font = "bold 28px 'Courier New'";
                ctx.fillStyle = "#ffaa66";
                ctx.fillText("🍖 GAME OVER 🥖", ORIGINAL_WIDTH/2-130, 110);
                ctx.font = "16px monospace";
                ctx.fillStyle = "#ffaa66";
                ctx.fillText("Нажмите «НОВАЯ ИГРА»", ORIGINAL_WIDTH/2-110, 150);
            }
            
            ctx.font = "bold 22px 'Courier New'";
            ctx.fillStyle = "#ffffff";
            ctx.shadowBlur = 2;
            ctx.fillText("🍖 "+Math.floor(score), ORIGINAL_WIDTH-85, 38);
            ctx.shadowBlur = 0;
        }
        
        function restartGame() {
            gameRunning = true;
            score = 0;
            speed = 5;
            obstacles = [];
            isJumping = false;
            yPos = 0;
            yVelocity = 0;
            frame = 0;
            pendingJump = false;
            lastRunningSoundFrame = 0;
            pendingRecordScore = null;
            document.getElementById('scoreValue').innerText = "0";
            document.getElementById('gameStatusText').innerHTML = "🥖 БЕГИ!";
            updateHighScoreUI();
            if (gameStarted && musicEnabled && soundEnabled) {
                startMusic();
            }
        }
        
        function jump() {
            if (!gameStarted || !gameRunning) return;
            if (!isJumping && yPos === 0) {
                pendingJump = true;
                document.getElementById('gameStatusText').innerHTML = "⚽ ПРЫЖОК! ⚽";
                setTimeout(() => {
                    if(gameRunning && gameStarted) document.getElementById('gameStatusText').innerHTML = "🥖 БЕГИ!";
                }, 400);
            }
        }
        
        function startGame() {
            if (gameStarted) return;
            gameStarted = true;
            startOverlay.style.display = "none";
            restartGame();
        }
        
        startOverlay.addEventListener('click', startGame);
        
        document.getElementById('jumpButton').addEventListener('click', () => jump());
        document.getElementById('jumpButton').addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
        canvas.addEventListener('click', () => jump());
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
        
        document.addEventListener('keydown', (e) => {
            if (!gameStarted) {
                if (e.key === 'ArrowUp' || e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    startGame();
                }
                return;
            }
            if (e.key === 'ArrowUp' || e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                jump();
            }
            if (e.key === 'r' || e.key === 'R') restartGame();
        });
        
        document.getElementById('restartButton').addEventListener('click', () => {
            if (!gameStarted) {
                startGame();
            } else {
                restartGame();
            }
        });
        
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key === ' ' || e.key === 'Space') e.preventDefault();
        });
        
        initSounds();
        
        function drawStatic() {
            ctx.clearRect(0, 0, ORIGINAL_WIDTH, ORIGINAL_HEIGHT);
            drawParisBackground();
            drawFootballField();
            drawPlayer();
            ctx.font = "bold 22px 'Courier New'";
            ctx.fillStyle = "#ffffff";
            ctx.shadowBlur = 2;
            ctx.fillText("🍖 0", ORIGINAL_WIDTH-85, 38);
            ctx.shadowBlur = 0;
            requestAnimationFrame(drawStatic);
        }
        
        if (!gameStarted) {
            drawStatic();
        }
        
        function gameLoop() {
            if (gameStarted) {
                updateGame();
                draw();
            }
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    })();
</script>
</body>
</html>
