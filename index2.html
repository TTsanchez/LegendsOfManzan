<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LegendsOfManzan</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        @media (max-width: 768px) and (orientation: portrait) {
            body::before {
                content: "📱 ПОВЕРНИТЕ ТЕЛЕФОН В ГОРИЗОНТАЛЬНОЕ ПОЛОЖЕНИЕ 📱";
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: #000;
                color: #fff;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                font-size: 1.2rem;
                padding: 20px;
                z-index: 9999;
                font-family: monospace;
            }
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        
        // ==============================================
        // НАСТРОЙКИ ИГРЫ (ФИЗИКА ПРИВЯЗАНА К ВЫСОТЕ ЭКРАНА)
        // ==============================================
        const CONFIG = {
            // Относительные проценты (от высоты экрана)
            GROUND_Y_PERCENT: 72,           // позиция земли от верха (%)
            JUMP_HEIGHT_PERCENT: 28,         // ВЫСОТА ПРЫЖКА в % от высоты экрана (увеличено с 24 до 28)
            
            PLAYER_WIDTH_PERCENT: 18,
            PLAYER_HEIGHT_PERCENT: 26,
            PLAYER_X_PERCENT: 8,
            PLAYER_Y_OFFSET_PERCENT: 5,
            
            HITBOX_WIDTH_PERCENT: 45,
            HITBOX_HEIGHT_PERCENT: 85,
            HITBOX_OFFSET_X_PERCENT: 12,
            HITBOX_OFFSET_Y_PERCENT: 0,
            
            OBSTACLE_SIZE_PERCENT: 14,       // увеличен размер препятствий
            
            // БАЗОВЫЕ ФИЗИЧЕСКИЕ ПАРАМЕТРЫ (в пикселях/кадр²)
            // Рассчитываются динамически под экран пользователя
            GRAVITY_PX_PER_FRAME2: 0.65,     // гравитация в пикселях за кадр² (константа, не зависит от экрана)
            JUMP_VELOCITY_PX_PER_FRAME: 0,   // будет рассчитана из высоты прыжка
            
            // Скорость движения препятствий
            BASE_SPEED_PX_PER_FRAME: 6,      // базовая скорость в пикселях/кадр
            MAX_SPEED_PX_PER_FRAME: 24,      // максимальная скорость
            
            SCORE_SPEED_INCREASE: 200,       // через сколько очков увеличивается скорость
            SPAWN_BASE_RATE: 70,
            
            GRASS_HEIGHT_PERCENT: 28,
            GRASS_SPEED_MULT: 0.8,
            
            UI_FONT_SIZE_PERCENT: 1.2,
            UI_PANEL_WIDTH_PERCENT: 5,
            
            GAMEOVER_FONT_SIZE_PERCENT: 2,
            GAMEOVER_BTN_WIDTH_PERCENT: 25,
            GAMEOVER_BTN_HEIGHT_PERCENT: 7,
            
            BACKGROUND_OBJECTS: {
                ENABLED: true,
                SPAWN_CHANCE: 0.01,
                MIN_DISTANCE: 900,
                MAX_OBJECTS: 4,
            },
        };
        
        // ========== НАСТРОЙКИ ФОНОВЫХ ОБЪЕКТОВ ==========
        const BG_OBJECTS_CONFIG = [
            {
                type: "static",
                image: "manz/zabor.png",
                sizePercent: 14,
                sinkPercent: 25,
                speedMult: 0.6,
                spawnWeight: 1,
                name: "Забор"
            },
            {
                type: "static",
                image: "manz/вышка.png",
                sizePercent: 45,
                sinkPercent: 6,
                speedMult: 0.6,
                spawnWeight: 0.5,
                name: "Вышка"
            },
            {
                type: "static",
                image: "manz/вышка2.png",
                sizePercent: 45,
                sinkPercent: 6,
                speedMult: 0.6,
                spawnWeight: 0.5,
                name: "Вышка2"
            },
            {
                type: "animated",
                frames: [
    "lexa/IMG_4700_00000.png",
    "lexa/IMG_4700_00001.png",
    "lexa/IMG_4700_00002.png",
    "lexa/IMG_4700_00003.png",
    "lexa/IMG_4700_00004.png",
    "lexa/IMG_4700_00005.png",
    "lexa/IMG_4700_00006.png",
    "lexa/IMG_4700_00007.png",
    "lexa/IMG_4700_00008.png",
    "lexa/IMG_4700_00009.png",
    "lexa/IMG_4700_00010.png",
    "lexa/IMG_4700_00011.png",
    "lexa/IMG_4700_00012.png",
    "lexa/IMG_4700_00013.png",
    "lexa/IMG_4700_00014.png",
    "lexa/IMG_4700_00015.png",
    "lexa/IMG_4700_00016.png",
    "lexa/IMG_4700_00017.png",
    "lexa/IMG_4700_00018.png",
    "lexa/IMG_4700_00019.png",
    "lexa/IMG_4700_00020.png",
    "lexa/IMG_4700_00021.png",
    "lexa/IMG_4700_00022.png",
    "lexa/IMG_4700_00023.png",
    "lexa/IMG_4700_00024.png",
    "lexa/IMG_4700_00025.png",
    "lexa/IMG_4700_00026.png",
    "lexa/IMG_4700_00027.png",
    "lexa/IMG_4700_00028.png",
    "lexa/IMG_4700_00029.png",
    "lexa/IMG_4700_00030.png",
    "lexa/IMG_4700_00031.png",
    "lexa/IMG_4700_00032.png",
    "lexa/IMG_4700_00033.png",
    "lexa/IMG_4700_00034.png",
    "lexa/IMG_4700_00035.png",
    "lexa/IMG_4700_00036.png",
    "lexa/IMG_4700_00037.png",
    "lexa/IMG_4700_00038.png",
    "lexa/IMG_4700_00039.png",
    "lexa/IMG_4700_00040.png",
    "lexa/IMG_4700_00041.png",
    "lexa/IMG_4700_00042.png",
    "lexa/IMG_4700_00043.png",
    "lexa/IMG_4700_00044.png",
    "lexa/IMG_4700_00045.png",
    "lexa/IMG_4700_00046.png",
    "lexa/IMG_4700_00047.png",
    "lexa/IMG_4700_00048.png",
    "lexa/IMG_4700_00049.png",
    "lexa/IMG_4700_00050.png",
    "lexa/IMG_4700_00051.png",
    "lexa/IMG_4700_00052.png",
    "lexa/IMG_4700_00053.png",
    "lexa/IMG_4700_00054.png"
],
                frameDelay: 1,
                sizePercent: 20,
                sinkPercent: 5,
                speedMult: 0.6,
                spawnWeight: 0.9,
                name: "leha"
            },
        ];
        
        // ========== ОТОБРАЖЕНИЕ ХИТБОКСОВ ==========
        let showHitboxes = false;
        
        // ========== ПУТИ К ФАЙЛАМ ==========
        const GRASS_TEXTURE_IMAGE = "manz/grass_z.png";
        const RUN_FRAMES = ["manz/1.png", "manz/2.png", "manz/3.png", "manz/4.png"];
        const JUMP_SPRITE = "manz/jump.png";
        const RIB_SPRITE = "pngtree-roasted-pork-ribs-png-image_13146536.png";
        const PARIS_BG_IMAGE = "manz/back.jpg";
        const MUSIC_FILE = "french meme song.mp3";
        const RECORD_SOUND = "manz/record.mp3";
        const JUMP_SOUNDS = ["manz/jump1.mp3", "manz/jump2.mp3"];
        const DEATH_SOUNDS = ["manz/death1.mp3", "manz/death3.mp3"];
        
        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        let screenWidth = 0, screenHeight = 0;
        let groundY = 0;
        
        // ФИЗИЧЕСКИЕ ПАРАМЕТРЫ (в пикселях)
        let jumpHeightPx = 0;        // высота прыжка в пикселях
        let jumpVelocity = 0;        // начальная скорость прыжка (пиксели/кадр)
        let gravity = 0;             // гравитация (пиксели/кадр²)
        
        let currentSpeed = 0;        // текущая скорость движения (пиксели/кадр)
        
        let playerWidth = 0, playerHeight = 0;
        let playerX = 0, playerYBase = 0;
        let hitboxW = 0, hitboxH = 0, hitboxX = 0, hitboxY = 0;
        
        let obstacleSize = 0;
        let obstacleHitboxW = 0, obstacleHitboxH = 0, obstacleHitboxX = 0, obstacleHitboxY = 0;
        
        let grassHeight = 0, grassWidth = 0, textureOffset = 0;
        
        let uiFontSize = 0, uiPanelWidth = 0;
        let gameOverFontSize = 0, gameOverBtnW = 0, gameOverBtnH = 0;
        
        // Фоновые объекты
        let bgObjectsData = [];
        let bgObjectsList = [];
        let bgObjectsReady = false;
        
        let gameStarted = false;
        let gameRunning = true;
        let score = 0;
        let highScore = localStorage.getItem('ribHighScore') ? parseInt(localStorage.getItem('ribHighScore')) : 0;
        let frame = 0;
        
        let isJumping = false;
        let yPos = 0;
        let yVelocity = 0;
        let pendingJump = false;
        
        let currentRunFrame = 0;
        let frameCounter = 0;
        let obstacles = [];
        
        let grassTexture = null;
        let runImages = [];
        let jumpImage = null;
        let ribImage = null;
        let parisBackground = new Image();
        let backgroundLoaded = false;
        let grassTextureLoaded = false;
        
        let soundEnabled = true;
        let musicEnabled = true;
        let bgMusic = null;
        let recordSound = null;
        let jumpSounds = [];
        let deathSounds = [];
        
        let loadedCount = 0;
        
        let showRecordNotification = false;
        let recordNotificationOpacity = 0;
        let recordNotificationSlide = -100;
        let recordNotificationTimer = 0;
        let recordNotificationAnimTimer = 0;
        
        // ==============================================
        // ФУНКЦИЯ ПЕРЕРАСЧЕТА ФИЗИКИ ПОД ЭКРАН
        // ==============================================
        function recalcPhysics() {
            // Высота прыжка в пикселях (увеличенная)
            jumpHeightPx = screenHeight * (CONFIG.JUMP_HEIGHT_PERCENT / 100);
            
            // Гравитация - фиксированное значение в пикселях/кадр²
            gravity = CONFIG.GRAVITY_PX_PER_FRAME2;
            
            // Вычисляем начальную скорость прыжка из формулы: v² = 2 * g * h
            // v = sqrt(2 * g * h)
            jumpVelocity = Math.sqrt(2 * gravity * jumpHeightPx);
            
            console.log(`Физика пересчитана: высота экрана=${screenHeight}px, высота прыжка=${jumpHeightPx.toFixed(1)}px, гравитация=${gravity}, нач.скорость=${jumpVelocity.toFixed(1)}px/кадр`);
        }
        
        // ========== ПЕРЕРАСЧЕТ ВСЕХ РАЗМЕРОВ ==========
        function recalcSizes() {
            screenWidth = window.innerWidth;
            screenHeight = window.innerHeight;
            
            canvas.width = screenWidth;
            canvas.height = screenHeight;
            
            // Пересчитываем физику под новый экран
            recalcPhysics();
            
            // Позиция земли
            groundY = screenHeight * (CONFIG.GROUND_Y_PERCENT / 100);
            
            // Размеры игрока
            playerWidth = screenHeight * (CONFIG.PLAYER_WIDTH_PERCENT / 100);
            playerHeight = screenHeight * (CONFIG.PLAYER_HEIGHT_PERCENT / 100);
            playerX = screenWidth * (CONFIG.PLAYER_X_PERCENT / 100);
            const playerYOffset = screenHeight * (CONFIG.PLAYER_Y_OFFSET_PERCENT / 100);
            playerYBase = groundY - playerHeight + playerYOffset;
            
            // Хитбоксы
            hitboxW = playerWidth * (CONFIG.HITBOX_WIDTH_PERCENT / 100);
            hitboxH = playerHeight * (CONFIG.HITBOX_HEIGHT_PERCENT / 100);
            hitboxX = playerWidth * (CONFIG.HITBOX_OFFSET_X_PERCENT / 100);
            hitboxY = (playerHeight - hitboxH) + playerHeight * (CONFIG.HITBOX_OFFSET_Y_PERCENT / 100);
            
            // Размер препятствий
            obstacleSize = screenHeight * (CONFIG.OBSTACLE_SIZE_PERCENT / 100);
            obstacleHitboxW = obstacleSize * 0.65;
            obstacleHitboxH = obstacleSize * 0.65;
            obstacleHitboxX = obstacleSize * 0.18;
            obstacleHitboxY = -obstacleSize * 0.03;
            
            // Трава
            grassHeight = screenHeight * (CONFIG.GRASS_HEIGHT_PERCENT / 100);
            grassWidth = grassHeight * 1.5;
            
            // UI размеры
            uiFontSize = Math.max(12, screenWidth * (CONFIG.UI_FONT_SIZE_PERCENT / 100));
            uiPanelWidth = screenWidth * (CONFIG.UI_PANEL_WIDTH_PERCENT / 100);
            gameOverFontSize = screenWidth * (CONFIG.GAMEOVER_FONT_SIZE_PERCENT / 100);
            gameOverBtnW = screenWidth * (CONFIG.GAMEOVER_BTN_WIDTH_PERCENT / 100);
            gameOverBtnH = screenHeight * (CONFIG.GAMEOVER_BTN_HEIGHT_PERCENT / 100);
            
            // Базовая скорость (в пикселях/кадр)
            currentSpeed = CONFIG.BASE_SPEED_PX_PER_FRAME;
            
            // Обновляем размеры фоновых объектов
            for (let obj of bgObjectsList) {
                if (obj.updateSize) obj.updateSize();
            }
        }
        
        // ========== ЗАГРУЗКА РЕСУРСОВ ==========
        function calculateTotalToLoad() {
            let total = RUN_FRAMES.length + 4;
            for (let obj of BG_OBJECTS_CONFIG) {
                if (obj.type === "static") {
                    total += 1;
                } else if (obj.type === "animated") {
                    total += obj.frames.length;
                }
            }
            return total;
        }
        
        let totalToLoad = calculateTotalToLoad();
        
        function imageLoaded() {
            loadedCount++;
            if (loadedCount === totalToLoad) {
                console.log("✅ Все ресурсы загружены!");
                bgObjectsReady = true;
            }
        }
        
        function loadBackgroundObjects() {
            for (let i = 0; i < BG_OBJECTS_CONFIG.length; i++) {
                const config = BG_OBJECTS_CONFIG[i];
                
                if (config.type === "static") {
                    const img = new Image();
                    img.onload = () => {
                        imageLoaded();
                        console.log(`✅ Загружен статичный объект: ${config.name}`);
                    };
                    img.onerror = () => {
                        console.warn(`⚠️ Не загрузился: ${config.name} (${config.image})`);
                        imageLoaded();
                    };
                    img.src = config.image;
                    
                    bgObjectsData.push({
                        type: "static",
                        image: img,
                        config: config
                    });
                    
                } else if (config.type === "animated") {
                    const frames = [];
                    let loadedFrames = 0;
                    
                    for (let f = 0; f < config.frames.length; f++) {
                        const frameImg = new Image();
                        frameImg.onload = () => {
                            loadedFrames++;
                            imageLoaded();
                            if (loadedFrames === config.frames.length) {
                                console.log(`✅ Загружен анимированный объект: ${config.name} (${config.frames.length} кадров)`);
                            }
                        };
                        frameImg.onerror = () => {
                            console.warn(`⚠️ Не загрузился кадр: ${config.name} - ${config.frames[f]}`);
                            loadedFrames++;
                            imageLoaded();
                        };
                        frameImg.src = config.frames[f];
                        frames.push(frameImg);
                    }
                    
                    bgObjectsData.push({
                        type: "animated",
                        frames: frames,
                        config: config,
                        currentFrame: 0,
                        frameCounter: 0
                    });
                }
            }
        }
        
        function loadGrassTexture() {
            grassTexture = new Image();
            grassTexture.onload = () => { grassTextureLoaded = true; imageLoaded(); };
            grassTexture.onerror = () => { grassTextureLoaded = false; imageLoaded(); };
            grassTexture.src = GRASS_TEXTURE_IMAGE;
        }
        
        for (let i = 0; i < RUN_FRAMES.length; i++) {
            let img = new Image();
            img.onload = imageLoaded;
            img.onerror = () => imageLoaded();
            img.src = RUN_FRAMES[i];
            runImages.push(img);
        }
        
        jumpImage = new Image();
        jumpImage.onload = imageLoaded;
        jumpImage.onerror = () => imageLoaded();
        jumpImage.src = JUMP_SPRITE;
        
        ribImage = new Image();
        ribImage.onload = imageLoaded;
        ribImage.onerror = () => imageLoaded();
        ribImage.src = RIB_SPRITE;
        
        parisBackground.onload = () => { backgroundLoaded = true; imageLoaded(); };
        parisBackground.onerror = () => { backgroundLoaded = false; imageLoaded(); };
        parisBackground.src = PARIS_BG_IMAGE;
        
        loadGrassTexture();
        loadBackgroundObjects();
        
        // ========== ЗВУКИ ==========
        function createAudio(url, loop = false, volume = 0.5) {
            if (!url) return null;
            const audio = new Audio();
            audio.src = url;
            audio.loop = loop;
            audio.volume = volume;
            audio.load();
            return audio;
        }
        
        function getRandomSound(soundArray) {
            const valid = soundArray.filter(s => s);
            return valid.length ? valid[Math.floor(Math.random() * valid.length)] : null;
        }
        
        function playRandomJumpSound() {
            if (!soundEnabled || !gameStarted) return;
            const sound = getRandomSound(jumpSounds);
            if (sound) { sound.currentTime = 0; sound.play().catch(e => {}); }
        }
        
        function playRandomDeathSound() {
            if (!soundEnabled) return;
            const sound = getRandomSound(deathSounds);
            if (sound) { sound.currentTime = 0; sound.play().catch(e => {}); }
        }
        
        function startMusic() {
            if (bgMusic && musicEnabled && soundEnabled && gameStarted && gameRunning) {
                bgMusic.play().catch(e => {});
            }
        }
        
        function stopMusic() {
            if (bgMusic) { bgMusic.pause(); bgMusic.currentTime = 0; }
        }
        
        function toggleMusic() {
            musicEnabled = !musicEnabled;
            if (musicEnabled && gameStarted && gameRunning) startMusic();
            else stopMusic();
        }
        
        function initSounds() {
            bgMusic = createAudio(MUSIC_FILE, true, 0.3);
            recordSound = createAudio(RECORD_SOUND, false, 0.7);
            JUMP_SOUNDS.forEach(s => jumpSounds.push(createAudio(s, false, 0.5)));
            DEATH_SOUNDS.forEach(s => deathSounds.push(createAudio(s, false, 0.6)));
        }
        
        // ========== ФУНКЦИИ ДЛЯ ОТРИСОВКИ ХИТБОКСОВ ==========
        function drawHitbox(x, y, w, h, color = "rgba(255, 0, 0, 0.5)") {
            if (!showHitboxes) return;
            ctx.save();
            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = 2;
            ctx.fillRect(x, y, w, h);
            ctx.strokeRect(x, y, w, h);
            ctx.restore();
        }
        
        // ========== ФОНОВЫЕ ОБЪЕКТЫ (упрощенно) ==========
        class BackgroundObject {
            constructor(xPos, objectData) {
                this.x = xPos;
                this.objectData = objectData;
                this.width = 0;
                this.height = 0;
                this.updateSize();
            }
            
            updateSize() {
                let imgToUse = null;
                if (this.objectData.type === "static") {
                    imgToUse = this.objectData.image;
                } else if (this.objectData.type === "animated") {
                    if (this.objectData.frames.length > 0) {
                        imgToUse = this.objectData.frames[0];
                    }
                }
                if (!imgToUse || !imgToUse.complete || imgToUse.naturalWidth === 0) return;
                
                const baseSize = screenHeight * (this.objectData.config.sizePercent / 100);
                const aspectRatio = imgToUse.naturalWidth / imgToUse.naturalHeight;
                this.height = baseSize;
                this.width = this.height * aspectRatio;
            }
            
            getCurrentImage() {
                if (this.objectData.type === "static") return this.objectData.image;
                else if (this.objectData.type === "animated") {
                    return this.objectData.frames[this.objectData.currentFrame];
                }
                return null;
            }
            
            updateAnimation() {
                if (this.objectData.type !== "animated") return;
                const animData = this.objectData;
                animData.frameCounter++;
                if (animData.frameCounter >= animData.config.frameDelay) {
                    animData.frameCounter = 0;
                    animData.currentFrame = (animData.currentFrame + 1) % animData.frames.length;
                }
            }
            
            draw() {
                const imgToDraw = this.getCurrentImage();
                if (!imgToDraw || !imgToDraw.complete) return;
                if (this.width === 0) this.updateSize();
                const sinkOffset = this.height * (this.objectData.config.sinkPercent / 100);
                const y = groundY - this.height + sinkOffset;
                ctx.drawImage(imgToDraw, this.x, y, this.width, this.height);
            }
            
            update() {
                this.updateAnimation();
                this.x -= currentSpeed * this.objectData.config.speedMult;
            }
            
            isOffscreen() {
                return this.x + this.width < 0;
            }
        }
        
        function spawnBackgroundObject() {
            if (!CONFIG.BACKGROUND_OBJECTS.ENABLED) return;
            if (!bgObjectsReady) return;
            if (bgObjectsData.length === 0) return;
            if (bgObjectsList.length >= CONFIG.BACKGROUND_OBJECTS.MAX_OBJECTS) return;
            
            let lastX = -1000;
            for (let obj of bgObjectsList) {
                if (obj.x > lastX) lastX = obj.x;
            }
            if (lastX + CONFIG.BACKGROUND_OBJECTS.MIN_DISTANCE > screenWidth) return;
            if (Math.random() > CONFIG.BACKGROUND_OBJECTS.SPAWN_CHANCE) return;
            
            let totalWeight = 0;
            for (let obj of bgObjectsData) totalWeight += obj.config.spawnWeight;
            let random = Math.random() * totalWeight;
            let selectedObject = null;
            for (let obj of bgObjectsData) {
                random -= obj.config.spawnWeight;
                if (random <= 0) { selectedObject = obj; break; }
            }
            if (!selectedObject) selectedObject = bgObjectsData[0];
            
            const newObj = new BackgroundObject(screenWidth + Math.random() * 150, selectedObject);
            bgObjectsList.push(newObj);
        }
        
        function updateBackgroundObjects() {
            for (let i = 0; i < bgObjectsList.length; i++) {
                bgObjectsList[i].update();
                if (bgObjectsList[i].isOffscreen()) {
                    bgObjectsList.splice(i, 1);
                    i--;
                }
            }
            if (gameStarted && gameRunning) spawnBackgroundObject();
        }
        
        function drawBackgroundObjects() {
            for (let obj of bgObjectsList) obj.draw();
        }
        
        // ========== ПРЕПЯТСТВИЯ ==========
        class Ribs {
            constructor(xPos) {
                this.x = xPos;
                this.size = obstacleSize;
                this.passed = false;
            }
            draw() {
                if (ribImage.complete && ribImage.naturalWidth > 0) {
                    ctx.drawImage(ribImage, this.x, groundY - this.size, this.size, this.size);
                } else {
                    ctx.fillStyle = "#ffaa66";
                    ctx.fillRect(this.x, groundY - this.size, this.size, this.size);
                }
                const obsBox = this.getHitboxRect();
                drawHitbox(obsBox.x, obsBox.y, obsBox.w, obsBox.h, "rgba(0, 255, 0, 0.4)");
            }
            update() { this.x -= currentSpeed; }
            getHitboxRect() {
                return {
                    x: this.x + obstacleHitboxX,
                    y: groundY - obstacleHitboxH + obstacleHitboxY,
                    w: obstacleHitboxW,
                    h: obstacleHitboxH
                };
            }
        }
        
        function spawnObstacle() {
            const dynamicGap = Math.max(200, Math.min(400, 350 - currentSpeed * 6));
            if (obstacles.length === 0) {
                obstacles.push(new Ribs(screenWidth));
            } else {
                const last = obstacles[obstacles.length-1];
                if (last.x < screenWidth - dynamicGap) {
                    obstacles.push(new Ribs(screenWidth));
                }
            }
        }
        
        function checkCollision() {
            const playerBox = {
                x: playerX + hitboxX,
                y: playerYBase + yPos + hitboxY,
                w: hitboxW,
                h: hitboxH
            };
            for(let obs of obstacles) {
                const obsBox = obs.getHitboxRect();
                if (playerBox.x < obsBox.x + obsBox.w &&
                    playerBox.x + playerBox.w > obsBox.x &&
                    playerBox.y < obsBox.y + obsBox.h &&
                    playerBox.y + playerBox.h > obsBox.y) return true;
            }
            return false;
        }
        
        // ========== ОТРИСОВКА ==========
        function drawParisBackground() {
            if (backgroundLoaded && parisBackground.complete && parisBackground.naturalWidth > 0) {
                ctx.drawImage(parisBackground, 0, 0, screenWidth, groundY);
            } else {
                const grad = ctx.createLinearGradient(0, 0, 0, groundY);
                grad.addColorStop(0, "#87CEEB");
                grad.addColorStop(1, "#B0E0FF");
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, screenWidth, groundY);
            }
        }
        
        function drawGrass() {
            if (!gameRunning) {
                if (grassTextureLoaded && grassTexture && grassTexture.complete) {
                    const startY = groundY - 5;
                    for(let y = 0; y < screenHeight - startY + grassHeight; y += grassHeight) {
                        for(let x = -grassWidth; x <= screenWidth + grassWidth; x += grassWidth) {
                            ctx.drawImage(grassTexture, x + textureOffset, startY + y, grassWidth, grassHeight);
                        }
                    }
                }
                return;
            }
            
            if (grassTextureLoaded && grassTexture && grassTexture.complete) {
                const startY = groundY - 5;
                for(let y = 0; y < screenHeight - startY + grassHeight; y += grassHeight) {
                    for(let x = -grassWidth; x <= screenWidth + grassWidth; x += grassWidth) {
                        ctx.drawImage(grassTexture, x + textureOffset, startY + y, grassWidth, grassHeight);
                    }
                }
                textureOffset = (textureOffset - currentSpeed * CONFIG.GRASS_SPEED_MULT) % grassWidth;
            } else {
                ctx.fillStyle = "#2d6a2d";
                ctx.fillRect(0, groundY, screenWidth, screenHeight - groundY);
            }
        }
        
        function drawPlayer() {
            const x = playerX;
            const y = playerYBase + yPos;
            
            let imgToDraw = null;
            if (isJumping) imgToDraw = jumpImage;
            else if (runImages.length && runImages[currentRunFrame]?.complete) imgToDraw = runImages[currentRunFrame];
            
            ctx.fillStyle = "rgba(0,0,0,0.35)";
            ctx.beginPath();
            ctx.ellipse(x + playerWidth/2, playerYBase + yPos + playerHeight - 8, playerWidth/2.2, playerHeight/12, 0, 0, Math.PI*2);
            ctx.fill();
            
            if (imgToDraw && imgToDraw.complete && imgToDraw.naturalWidth > 0) {
                ctx.drawImage(imgToDraw, x, y, playerWidth, playerHeight);
            } else {
                ctx.fillStyle = "#ffcc88";
                ctx.fillRect(x, y, playerWidth, playerHeight);
            }
            
            const playerHitboxX = playerX + hitboxX;
            const playerHitboxY = playerYBase + yPos + hitboxY;
            drawHitbox(playerHitboxX, playerHitboxY, hitboxW, hitboxH, "rgba(255, 0, 0, 0.4)");
        }
        
        function drawUI() {
            const margin = 8;
            const panelH = uiFontSize * 2.5;
            
            ctx.fillStyle = "rgba(0,0,0,0.65)";
            ctx.fillRect(margin, margin, uiPanelWidth, panelH);
            ctx.fillStyle = "#ffd966";
            ctx.font = `bold ${uiFontSize - 2}px monospace`;
            ctx.fillText("СЧЁТ", margin + 5, margin + uiFontSize);
            ctx.fillStyle = "#fff";
            ctx.font = `bold ${uiFontSize + 2}px monospace`;
            ctx.fillText(Math.floor(score), margin + 5, margin + uiFontSize * 1.8);
            
            ctx.fillStyle = "rgba(0,0,0,0.65)";
            ctx.fillRect(screenWidth - uiPanelWidth - margin, margin, uiPanelWidth, panelH);
            ctx.fillStyle = "#ffd966";
            ctx.font = `bold ${uiFontSize - 2}px monospace`;
            ctx.fillText("РЕКОРД", screenWidth - uiPanelWidth - margin + 5, margin + uiFontSize);
            ctx.fillStyle = "#fff";
            ctx.font = `bold ${uiFontSize + 2}px monospace`;
            ctx.fillText(highScore, screenWidth - uiPanelWidth - margin + 5, margin + uiFontSize * 1.8);
            
            const musicW = uiFontSize * 3;
            const musicH = uiFontSize * 1.5;
            const musicX = screenWidth - musicW - margin;
            const musicY = margin + panelH + 5;
            ctx.fillStyle = musicEnabled ? "#2a7a2a" : "#555";
            ctx.fillRect(musicX, musicY, musicW, musicH);
            ctx.fillStyle = "#fff";
            ctx.font = `bold ${uiFontSize - 4}px monospace`;
            ctx.fillText(musicEnabled ? "🎵" : "🔇", musicX + musicW/2 - 7, musicY + musicH - 5);
            
            if (showHitboxes) {
                ctx.fillStyle = "rgba(255, 0, 0, 0.8)";
                ctx.font = `bold ${uiFontSize - 4}px monospace`;
                ctx.fillText("🔴 HITBOXES ON", margin, margin + panelH + musicH + 10);
            }
        }
        
        function drawGameOver() {
            ctx.fillStyle = "rgba(0,0,0,0.88)";
            ctx.fillRect(0, 0, screenWidth, screenHeight);
            
            ctx.font = `bold ${gameOverFontSize}px monospace`;
            ctx.fillStyle = "#ffaa66";
            const goText = "GAME OVER";
            const tw = ctx.measureText(goText).width;
            ctx.fillText(goText, screenWidth/2 - tw/2, screenHeight/2 - 60);
            
            if(showRecordNotification && recordNotificationTimer > 0) {
                let currentOpacity = Math.min(1, recordNotificationTimer / 30);
                const notifWidth = screenWidth * 0.7;
                const notifHeight = gameOverFontSize * 1.2;
                const notifX = (screenWidth - notifWidth) / 2;
                const notifY = 20;
                ctx.globalAlpha = currentOpacity * 0.95;
                ctx.fillStyle = "#1a1a2e";
                ctx.fillRect(notifX, notifY, notifWidth, notifHeight);
                ctx.fillStyle = "#ffd700";
                ctx.fillRect(notifX, notifY, notifWidth, 3);
                ctx.globalAlpha = currentOpacity;
                ctx.font = `bold ${gameOverFontSize * 0.55}px monospace`;
                ctx.fillStyle = "#ffd700";
                ctx.fillText("🏆", notifX + 15, notifY + notifHeight - 12);
                ctx.fillStyle = "#ffffff";
                const recordText = `НОВЫЙ РЕКОРД! ${Math.floor(highScore)} очков`;
                const textWidth = ctx.measureText(recordText).width;
                ctx.fillText(recordText, notifX + (notifWidth - textWidth) / 2, notifY + notifHeight - 12);
                ctx.globalAlpha = 1;
            }
            
            const btnX = screenWidth/2 - gameOverBtnW/2;
            const btnY = screenHeight/2 + 40;
            ctx.fillStyle = "#d96c1e";
            ctx.fillRect(btnX, btnY, gameOverBtnW, gameOverBtnH);
            ctx.fillStyle = "#fff";
            ctx.font = `bold ${gameOverFontSize - 6}px monospace`;
            const btnText = "▶ НОВАЯ ИГРА";
            const btnTw = ctx.measureText(btnText).width;
            ctx.fillText(btnText, screenWidth/2 - btnTw/2, btnY + gameOverBtnH - 12);
        }
        
        function drawStartScreen() {
            ctx.fillStyle = "rgba(0,0,0,0.88)";
            ctx.fillRect(0, 0, screenWidth, screenHeight);
            
            const titleSize = Math.max(18, Math.floor(screenWidth / 28));
            ctx.font = `bold ${titleSize}px monospace`;
            ctx.fillStyle = "#ffaa66";
            const title = "👉 НАЖМИТЕ, ЧТОБЫ НАЧАТЬ 👈";
            const tw = ctx.measureText(title).width;
            ctx.fillText(title, screenWidth/2 - tw/2, screenHeight/2 - 40);
            
            ctx.font = `${titleSize - 6}px monospace`;
            ctx.fillStyle = "#ccc";
            const subtitle = "Legends Of Manzan";
            const sw = ctx.measureText(subtitle).width;
            ctx.fillText(subtitle, screenWidth/2 - sw/2, screenHeight/2 + 20);
        }
        
        function draw() {
            if (!gameStarted) {
                drawStartScreen();
                return;
            }
            drawParisBackground();
            drawGrass();
            drawBackgroundObjects();
            for(let obs of obstacles) obs.draw();
            drawPlayer();
            drawUI();
            if(!gameRunning) drawGameOver();
        }
        
        // ========== ЛОГИКА ИГРЫ ==========
        function updateGame() {
            if(!gameStarted || !gameRunning) return;
            
            if(pendingJump && !isJumping && yPos === 0) {
                isJumping = true;
                yVelocity = -jumpVelocity;  // Отрицательная скорость = прыжок вверх
                playRandomJumpSound();
            }
            pendingJump = false;
            
            if(isJumping) {
                yPos += yVelocity;
                yVelocity += gravity;
                if(yPos >= 0) {
                    yPos = 0;
                    isJumping = false;
                    yVelocity = 0;
                }
            }
            
            if(!isJumping && gameRunning && runImages.length) {
                frameCounter++;
                if(frameCounter > 5) {
                    frameCounter = 0;
                    currentRunFrame = (currentRunFrame + 1) % runImages.length;
                }
            }
            
            for(let i=0; i<obstacles.length; i++) {
                const obs = obstacles[i];
                obs.update();
                if(obs.x + obs.size < 0) {
                    obstacles.splice(i,1);
                    i--;
                    score += 15;
                    continue;
                }
                if(!obs.passed && obs.x + obs.size/2 < playerX) {
                    obs.passed = true;
                    score += 10;
                }
            }
            
            // Увеличение скорости с ростом счета
            const targetSpeed = CONFIG.BASE_SPEED_PX_PER_FRAME + Math.floor(score / CONFIG.SCORE_SPEED_INCREASE);
            let newSpeed = targetSpeed;
            if(newSpeed > CONFIG.MAX_SPEED_PX_PER_FRAME) newSpeed = CONFIG.MAX_SPEED_PX_PER_FRAME;
            if(currentSpeed < newSpeed) currentSpeed += 0.05;
            
            const spawnRate = Math.max(CONFIG.SPAWN_BASE_RATE, 130 - Math.floor(currentSpeed * 3));
            if(frame % Math.floor(spawnRate) === 0 && obstacles.length < 3) {
                if(Math.random() < 0.55) spawnObstacle();
            }
            
            updateBackgroundObjects();
            
            if(checkCollision()) {
                gameRunning = false;
                playRandomDeathSound();
                stopMusic();
                
                const currentHighScore = parseInt(localStorage.getItem('ribHighScore')) || 0;
                if(score > currentHighScore) {
                    highScore = score;
                    localStorage.setItem('ribHighScore', highScore);
                    showRecordNotification = true;
                    recordNotificationTimer = 90;
                    setTimeout(() => {
                        if (recordSound && soundEnabled && !gameRunning) {
                            recordSound.currentTime = 0;
                            recordSound.play().catch(e => {});
                        }
                    }, 500);
                }
            }
            
            if(frame % 60 === 0 && gameRunning) score += 2;
            frame++;
            
            if(showRecordNotification) {
                recordNotificationTimer--;
                if(recordNotificationTimer <= 0) showRecordNotification = false;
            }
        }
        
        function restartGame() {
            gameRunning = true;
            score = 0;
            obstacles = [];
            bgObjectsList = [];
            isJumping = false;
            yPos = 0;
            yVelocity = 0;
            frame = 0;
            pendingJump = false;
            showRecordNotification = false;
            currentSpeed = CONFIG.BASE_SPEED_PX_PER_FRAME;
            if (gameStarted && musicEnabled && soundEnabled) startMusic();
        }
        
        function jump() {
            if (!gameStarted) return;
            if (!gameRunning) return;
            if (!isJumping && yPos === 0) pendingJump = true;
        }
        
        function startGame() {
            if (gameStarted) return;
            gameStarted = true;
            restartGame();
        }
        
        // ========== СОБЫТИЯ ==========
        function handleCanvasClick(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            const canvasX = (clientX - rect.left) * scaleX;
            const canvasY = (clientY - rect.top) * scaleY;
            
            if (gameStarted && !gameRunning) {
                const btnX = screenWidth/2 - gameOverBtnW/2;
                const btnY = screenHeight/2 + 20;
                if (canvasX >= btnX && canvasX <= btnX + gameOverBtnW && canvasY >= btnY && canvasY <= btnY + gameOverBtnH) {
                    restartGame();
                    return;
                }
            }
            
            const margin = 8;
            const panelH = uiFontSize * 2.5;
            const musicW = uiFontSize * 3;
            const musicH = uiFontSize * 1.5;
            const musicX = screenWidth - musicW - margin;
            const musicY = margin + panelH + 5;
            
            if (canvasX >= musicX && canvasX <= musicX + musicW && canvasY >= musicY && canvasY <= musicY + musicH) {
                toggleMusic();
                return;
            }
            
            if (!gameStarted) startGame();
            else if (gameRunning) jump();
        }
        
        window.addEventListener('resize', () => {
            recalcSizes();
            for(let obs of obstacles) obs.size = obstacleSize;
        });
        
        canvas.addEventListener('click', handleCanvasClick);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleCanvasClick(e); });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'o' || e.key === 'O') {
                e.preventDefault();
                showHitboxes = !showHitboxes;
                console.log("Хитбоксы:", showHitboxes ? "ВКЛЮЧЕНЫ" : "ВЫКЛЮЧЕНЫ");
                return;
            }
            if (e.key === 'ArrowUp' || e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                if (!gameStarted) startGame();
                else if (gameRunning) jump();
            }
            if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                if (!gameStarted) startGame();
                else restartGame();
            }
        });
        
        // ========== ЗАПУСК ==========
        initSounds();
        recalcSizes();
        
        function gameLoop() {
            updateGame();
            draw();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    })();
</script>
</body>
</html>
